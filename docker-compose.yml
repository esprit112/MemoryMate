services:
  memorymate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: memorymate
    ports:
      - "3000:3000"
    volumes:
      # Ensure the trailing quote is removed
      - /mnt/5E728BBC728B9803/Documents/MemoryMate/Users:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - USERS_BASE_DIR=/data
      - DB_PATH=/data/memorymate.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    restart: unless-stopped
