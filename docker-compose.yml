services:
  memorymate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: memorymate
    network_mode: "host"
    volumes:
      - /mnt/5E728BBC728B9803/Documents/MemoryMate/Users:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # This helps Node prioritize IPv4 over IPv6, which is more stable for DNS lookups
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - USERS_BASE_DIR=/data
      - DB_PATH=/data/memorymate.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - SMS_WORKS_JWT=${SMS_WORKS_JWT}
    restart: unless-stopped
